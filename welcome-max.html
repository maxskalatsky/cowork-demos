<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Cowork, Max!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 60px 50px;
    text-align: center;
    max-width: 520px;
    animation: fadeUp 0.8s ease-out;
    position: relative;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .emoji { font-size: 64px; margin-bottom: 20px; animation: wave 2s ease-in-out infinite; display: inline-block; }
  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(20deg); }
    75% { transform: rotate(-10deg); }
  }
  h1 { color: #fff; font-size: 36px; margin-bottom: 12px; font-weight: 700; }
  .highlight { background: linear-gradient(90deg, #e94560, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { color: rgba(255,255,255,0.7); font-size: 18px; line-height: 1.6; margin-top: 16px; }
  .date { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 30px; letter-spacing: 1px; text-transform: uppercase; }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .orb1 { width: 300px; height: 300px; background: #e94560; top: -100px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: #0f3460; bottom: -150px; right: -150px; animation-delay: 2s; }
  .orb3 { width: 200px; height: 200px; background: #f5a623; top: 50%; right: -50px; animation-delay: 4s; }
  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(30px, -30px); }
  }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>Hey, <span class="highlight">Max</span>!</h1>
    <p>Welcome to Cowork. This is your first creation — a little proof that everything's working. From docs to data to code, we've got a lot we can build together.</p>
    <div class="date">March 24, 2026</div>
  </div>
</body>
</html>
